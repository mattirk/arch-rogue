[DEPENDENCIES]
# pygbag packages the app folder (repo root) into the browser tarball.
# Exclude everything that is not needed at runtime in the browser:
#   /.venv  - the local development virtualenv (huge, never needed in-browser)
#   /web    - the web build/host tooling and the vendored runtime (served
#             separately from dist/cdn/, not needed inside the tarball)
#   /tests  - the unittest suite (not used by the browser build)
#   __pycache__ - compiled bytecode caches
# (/.git, /build, /dist are already ignored by pygbag's built-in list.)
ignoreDirs = ["/.venv", "/web", "/tests", "__pycache__"]
ignoreFiles = []
