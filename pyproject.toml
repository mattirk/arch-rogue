[project]
name = "arch-rogue"
version = "3.17.2"
description = "3.17.0 replaces the Rogue slot-3 Smoke Burst with Ambush Bell, a cursed lure trap for positioning, poison setup, and backstab burst."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
classifiers = [
    "License :: OSI Approved :: Apache Software License",
]
dependencies = [
    "pygame-ce>=2.5.0",
]

[project.optional-dependencies]
# Build-time only: packaging the game for the web via Pyodide/WASM.
web = [
    "pygbag",
]

[project.scripts]
arch-rogue = "arch_rogue.game:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
arch_rogue = ["assets/*.json", "assets/icons/*.png"]
