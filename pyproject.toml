[project]
name = "arch-rogue"
version = "3.18.3"
description = "3.18.3 adds a broad HUD render cache (rendered text surfaces, translucent/ornate panel art, and the action-icon body) so steady-state frames blit cached art instead of re-rendering it — ~20-30% lower draw time across all zoom levels on top of the 3.18.2 zoom-out lighting fix."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
classifiers = [
    "License :: OSI Approved :: Apache Software License",
]
dependencies = [
    "pygame-ce>=2.5.0",
]

[project.optional-dependencies]
# Build-time only: packaging the game for the web via Pyodide/WASM.
web = [
    "pygbag",
]

[project.scripts]
arch-rogue = "arch_rogue.game:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
arch_rogue = ["assets/*.json", "assets/icons/*.png"]
