[project]
name = "arch-rogue"
version = "3.7.5"
description = "3.7.5 optimizes the per-frame hot path (Bresenham line-of-sight, inlined floor checks, screen-space tile cull, cached font metrics, batched floor blits, and cached dark-floor alpha) so the browser build stays smooth at full-window resolution, alongside the 3.7 skill-path variability mechanics."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pygame-ce>=2.5.0",
]

[project.optional-dependencies]
# Build-time only: packaging the game for the web via Pyodide/WASM.
web = [
    "pygbag",
]

[project.scripts]
arch-rogue = "arch_rogue.game:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
arch_rogue = ["assets/*.json"]
