[project]
name = "arch-rogue"
version = "2.3.0"
description = "Milestone 2.0 story mode release of a modern isometric Rogue-inspired ARPG."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pygame-ce>=2.5.0",
]

[project.scripts]
arch-rogue = "arch_rogue.game:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
arch_rogue = ["assets/*.json"]
