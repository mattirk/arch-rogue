[project]
name = "arch-rogue"
version = "3.10.0"
description = "3.10.0 deepens loot-driven build variety with expanded affixes, combat synergies, archetype uniques, and clearer inventory hints."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pygame-ce>=2.5.0",
]

[project.optional-dependencies]
# Build-time only: packaging the game for the web via Pyodide/WASM.
web = [
    "pygbag",
]

[project.scripts]
arch-rogue = "arch_rogue.game:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
arch_rogue = ["assets/*.json"]
