[project]
name = "arch-rogue"
version = "3.18.4"
description = "3.18.4 retargets the Acolyte Blood branch lifesteal onto Blood Rite, Spirit Bolt, and Spirit Call (familiar hits), and removes familiar lifesteal from the Spirit branch (it was too strong). The dormant nova-only leech hook is repurposed as the shared Blood spell-leech ramp."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
classifiers = [
    "License :: OSI Approved :: Apache Software License",
]
dependencies = [
    "pygame-ce>=2.5.0",
]

[project.optional-dependencies]
# Build-time only: packaging the game for the web via Pyodide/WASM.
web = [
    "pygbag",
]

[project.scripts]
arch-rogue = "arch_rogue.game:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
arch_rogue = ["assets/*.json", "assets/icons/*.png"]
