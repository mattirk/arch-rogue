[project]
name = "arch-rogue"
version = "3.8.0"
description = "3.8.0 makes darkness the default dungeon state: most floors are dark, while a spread of light floors use fog-of-war memory so explored terrain stays revealed, alongside the 3.7 skill-path variability mechanics.",
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pygame-ce>=2.5.0",
]

[project.optional-dependencies]
# Build-time only: packaging the game for the web via Pyodide/WASM.
web = [
    "pygbag",
]

[project.scripts]
arch-rogue = "arch_rogue.game:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
arch_rogue = ["assets/*.json"]
