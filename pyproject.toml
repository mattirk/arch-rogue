[project]
name = "arch-rogue"
version = "3.8.1"
description = "3.8.1 consolidates skill and potion hotkeys onto the number keys (1-6) so the action bar is the single source of truth for combat inputs, alongside the 3.8 dark-default dungeon lighting.",
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pygame-ce>=2.5.0",
]

[project.optional-dependencies]
# Build-time only: packaging the game for the web via Pyodide/WASM.
web = [
    "pygbag",
]

[project.scripts]
arch-rogue = "arch_rogue.game:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
arch_rogue = ["assets/*.json"]
