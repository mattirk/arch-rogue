[project]
name = "arch-rogue"
version = "3.7.3"
description = "3.7.3 makes the browser build adapt the game surface to the browser's full available viewport size and resize with the window, on top of the fully-vendored, same-origin pygame-web build and the 3.7 skill-path variability mechanics."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pygame-ce>=2.5.0",
]

[project.optional-dependencies]
# Build-time only: packaging the game for the web via Pyodide/WASM.
web = [
    "pygbag",
]

[project.scripts]
arch-rogue = "arch_rogue.game:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
arch_rogue = ["assets/*.json"]
