[project]
name = "arch-rogue"
version = "3.15.0"
description = "3.15.0 adds Acolyte Spirit Call: a summonable familiar host that follows the Acolyte and attacks enemies, scaled by the Spirit skill branch, with three sprite variants, save support, and depth-sorted rendering."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
classifiers = [
    "License :: OSI Approved :: Apache Software License",
]
dependencies = [
    "pygame-ce>=2.5.0",
]

[project.optional-dependencies]
# Build-time only: packaging the game for the web via Pyodide/WASM.
web = [
    "pygbag",
]

[project.scripts]
arch-rogue = "arch_rogue.game:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
arch_rogue = ["assets/*.json", "assets/icons/*.png"]
